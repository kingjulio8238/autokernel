[project]
name = "autokernel"
version = "0.1.0"
description = "Recursive GPU kernel optimization via autoresearch"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "kernelbench",
    "matplotlib>=3.10.8",
    "numpy>=2.2.6",
    "pandas>=2.3.3",
    "torch==2.9.1",
    "triton",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128" },
]
kernelbench = { git = "https://github.com/ScalingIntelligence/KernelBench.git" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
